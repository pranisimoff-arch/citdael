<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Landing Page</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { width: 90%; margin: auto; overflow: hidden; }
        header { background: #333; color: #fff; padding: 10px 0; text-align: center; }
        .cta-button { background: #007BFF; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; transition: background 0.3s; }
        .cta-button:hover { background: #0056b3; }
        form { display: flex; flex-direction: column; max-width: 300px; margin: auto; }
        input[type="text"], input[type="email"] { padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        input[type="submit"] { background: #28a745; color: white; border: none; cursor: pointer; }
        /* Add smooth scroll effects */
        html { scroll-behavior: smooth; }
        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .container { width: 100%; }
            .cta-button { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Welcome to Our Service</h1>
            <a href="#contact" class="cta-button">Get Started</a>
        </div>
    </header>
    <section class="container">
        <h2>Contact Us</h2>
        <form id="contact">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <input type="submit" value="Submit">
        </form>
    </section>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = this[0].value;
            const email = this[1].value;
            if (!name || !email) {
                alert('Please fill in all fields.');
                return;
            }
            // Simulate form submission
            alert('Form submitted successfully!');
        });
    </script>
</body>
</html>
